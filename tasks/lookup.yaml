---
# Lookup tasks file for ansible-role-suricata

- name: "Set fact for version (Production)"
  set_fact:
    version: "7.0"
  when:
    - target == "production"
    - ansible_distribution_major_version >= '8'

- name: "Set fact for version (Legacy)"
  set_fact:
    version: "6.0"
  when:
    - target == "production"
    - ansible_distribution_major_version <= '7'

- name: "Set fact for version (Development)"
  set_fact:
    version: "devel"
  when:
    - target == "development"

- name: "Check if {{ suricata_group }} group exists"
  getent:
    database: group
    key: "{{ suricata_group }}"
  register: group_check
  ignore_errors: true
  changed_when: false

- name: "Check if {{ suricata_user }} user exists"
  getent:
    database: passwd
    key: "{{ suricata_user }}"
  register: user_check
  #failed_when: user_check.failed
  ignore_errors: true
  changed_when: false

- name: "Collect stats of archive_file"
  stat:
    path: "{{ archive_file }}"
  register: output
  when:
    - archive_file is defined
    - archive_file is string

- name: "Set fact for restore if archive_file exists"
  set_fact:
    restore: true
  when:
    - archive_file is defined
    - archive_file is string
    - output.stat.exists
    - output.stat.isreg
